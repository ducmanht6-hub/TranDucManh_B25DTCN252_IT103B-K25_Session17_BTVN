<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Công việc chuẩn bị Tết</title>

    <link rel="stylesheet" href="./btvn01-06.css">

</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Công việc chuẩn bị Tết</h1>
            <p>Quản lý toàn diện danh sách</p>
        </div>

        <div class="stats" id="stats"></div>

        <div class="input-area">
            <input id="task-input" placeholder="Nhập công việc mới...">
            <button class="add-btn" onclick="addTodo()">Thêm</button>
            <button class="clear-btn" onclick="clearAll()">Xóa toàn bộ</button>
        </div>

        <ul id="todo-list"></ul>

        <div class="footer">
            Mọi thay đổi được lưu tự động vào localStorage • Refresh để kiểm tra
        </div>

    </div>

    <script src="./btvn01-06.js"></script>

</body>

</html>
